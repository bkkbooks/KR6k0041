body:
  text: 解脫戒經僧昉述譯經緣起戒律者建定慧之妙幢殄闇惑之明燈度危嶮之蹊徑開憺怕之梁津寶殿之功罔初弗起踰越重閣非梯靡昇正法住滅驗之常典大聖泯暉邁餘千紀法澤遐流猶未周備令文學之徒異論競興薄俗之士訕音滿世余聽斯談輒𨶳慈範昧攬玄言乃矚大集聖所嗟歎言迦葉毘妙觀我人善摧惱結閑邪辯正極聖冲典每尋斯文慨五數闕敢以追訪獲斯戒本雖未廣具敬以洗心剪世浮辭大魏武定癸亥之年在鄴京都侍中尚書令高澄請為出焉羯磨中外國云若僧到時漢地迴文言時到僧忍聽言僧至我作法時莫遮我所作故言聽外國耳聽遮聽言音字別漢用一字所以致或
